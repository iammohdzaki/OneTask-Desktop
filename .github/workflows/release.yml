name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Release Notes'
        required: false
        default: 'Manual release'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact: desktopApp/build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            task: packageDeb
            artifact: desktopApp/build/compose/binaries/main/deb/*.deb
          - os: macos-latest
            task: packageDmg
            artifact: desktopApp/build/compose/binaries/main/dmg/*.dmg

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: matrix.os != 'windows-latest'
        run: chmod +x gradlew

      - name: Build and Package
        run: ./gradlew :desktopApp:${{ matrix.task }} "-PappVersion=${{ github.event.inputs.version_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets for release
        run: |
          mkdir release_assets
          find artifacts -name "*.msi" -exec cp {} release_assets/ \;
          find artifacts -name "*.deb" -exec cp {} release_assets/ \;
          find artifacts -name "*.dmg" -exec cp {} release_assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: OneTask v${{ github.event.inputs.version_name }}
          body: ${{ github.event.inputs.release_notes }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
